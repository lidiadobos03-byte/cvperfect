services:
  - type: web
    name: cvperfect-frontend
    rootDir: .
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    plan: free
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_STRIPE_PUBLIC_KEY
        sync: false
      - key: API_URL
        sync: false

  - type: web
    name: cvperfect-backend
    rootDir: backend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    plan: free
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
